<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mandelbrot Background</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <canvas id="fractal" aria-label="Animated Mandelbrot background"></canvas>
  <div id="menu-edge-zone" aria-hidden="true"></div>
  <div id="menu-overlay"></div>

  <button id="menu-peek-button" type="button" aria-label="Open settings" title="Open settings">
    <span class="menu-peek-chevron" aria-hidden="true"></span>
  </button>

  <button id="menu-close-handle" type="button" aria-label="Close settings" title="Close settings">
    <span class="menu-close-chevron" aria-hidden="true"></span>
  </button>

  <div id="scene-hud" aria-label="Scene controls">
    <button id="save-frame-button" class="hud-button" type="button" aria-label="Save current frame" title="Save current frame">
      <svg class="hud-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3v10"></path>
        <path d="M8 9l4 4 4-4"></path>
        <path d="M5 16v3h14v-3"></path>
      </svg>
      <span class="hud-button-label">Save</span>
    </button>
    <button id="pause-scene-button" class="hud-button" type="button" aria-label="Pause scene" aria-pressed="false" title="Pause scene">
      <svg class="hud-icon hud-icon-pause" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 5v14"></path>
        <path d="M15 5v14"></path>
      </svg>
      <svg class="hud-icon hud-icon-play" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 6l9 6-9 6z"></path>
      </svg>
      <span id="pause-scene-label" class="hud-button-label">Pause</span>
    </button>
    <button id="hold-scene-button" class="hud-button" type="button" aria-label="Stay on current scene" aria-pressed="false" title="Stay on current scene">
      <svg class="hud-icon" viewBox="0 0 24 24" aria-hidden="true">
        <line x1="11" y1="4" x2="20" y2="13" stroke-width="4.5"></line>
        <line x1="13.5" y1="10.5" x2="4" y2="20"></line>
      </svg>
      <span class="hud-button-label">Stay</span>
    </button>
    <button id="hud-new-scene-button" class="hud-button" type="button" aria-label="Generate new scene" title="Generate new scene">
      <svg class="hud-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M17 6A8 8 0 1112 4"></path>
        <path d="M8.5 1L12 4 8.5 7"></path>
      </svg>
      <span class="hud-button-label">New</span>
    </button>
  </div>

  <aside id="settings-drawer" aria-label="Fractal settings" aria-hidden="true">
    <header class="drawer-header">
      <h1>Mandelbrot Controls</h1>
      <div class="drawer-header-actions">
        <button id="theme-toggle-button" type="button" aria-label="Switch UI theme" aria-pressed="false" title="Switch UI theme">
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2.5v2.5"></path>
            <path d="M12 19v2.5"></path>
            <path d="M4.93 4.93l1.77 1.77"></path>
            <path d="M17.3 17.3l1.77 1.77"></path>
            <path d="M2.5 12H5"></path>
            <path d="M19 12h2.5"></path>
            <path d="M4.93 19.07l1.77-1.77"></path>
            <path d="M17.3 6.7l1.77-1.77"></path>
          </svg>
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 14.1A8 8 0 119.9 4 6.4 6.4 0 0020 14.1z"></path>
          </svg>
        </button>
        <button id="menu-close-button" type="button" aria-label="Close settings">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="drawer-drag-handle" aria-hidden="true"></div>

    <section class="control-section">
      <h2>Color</h2>
      <div class="label-row">
        <label for="palette-select">Palette</label>
        <button class="info-button" type="button" aria-label="About palette" data-info="Choose the overall color style.">i</button>
      </div>
      <div id="palette-dropdown" class="custom-dropdown">
        <button id="palette-dropdown-trigger" class="custom-dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="palette-dropdown-label"></span>
          <svg class="custom-dropdown-arrow" viewBox="0 0 12 7" aria-hidden="true">
            <path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul id="palette-dropdown-list" class="custom-dropdown-list" role="listbox" aria-label="Palette"></ul>
      </div>
      <select id="palette-select" style="display:none"></select>

      <div class="toggle-row">
        <span id="start-color-random-label">Random Start Color</span>
        <input id="start-color-random-toggle" type="checkbox" checked aria-labelledby="start-color-random-label">
        <button class="info-button" type="button" aria-label="About random start color" data-info="Start each new scene at a random place in the palette.">i</button>
      </div>

      <div class="label-row">
        <label for="start-color-slider">Start Color</label>
        <div class="label-side">
          <span id="start-color-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About start color" data-info="Pick where the palette begins when random start is off.">i</button>
        </div>
      </div>
      <input id="start-color-slider" type="range" min="0" max="1" step="0.001">

      <div class="label-row">
        <label for="palette-cycle-slider">Palette Cycle Length</label>
        <div class="label-side">
          <span id="palette-cycle-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About palette cycle length" data-info="Lower values repeat colors faster. Higher values stretch them out.">i</button>
        </div>
      </div>
      <input id="palette-cycle-slider" type="range" min="20" max="5000" step="0.1">

      <div class="label-row">
        <label for="color-increment-curve-slider">Marginal Color Increment</label>
        <div class="label-side">
          <span id="color-increment-curve-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About marginal color increment" data-info="Left is even. Right pushes more color detail into later escape levels.">i</button>
        </div>
      </div>
      <input id="color-increment-curve-slider" type="range" min="0" max="1" step="0.001">
      <div class="range-end-labels" aria-hidden="true">
        <span>Linear</span>
        <span>Logarithmic</span>
      </div>

      <div class="toggle-row">
        <span id="smooth-colors-label">Smooth Colors</span>
        <input id="smooth-colors-toggle" type="checkbox" checked aria-labelledby="smooth-colors-label">
        <button class="info-button" type="button" aria-label="About smooth colors" data-info="Blend between color bands so low cycle lengths still look continuous.">i</button>
      </div>
    </section>

    <section class="control-section">
      <h2>Timing</h2>
      <div class="label-row">
        <label for="scene-switch-mode">Scene Length Unit</label>
        <button class="info-button" type="button" aria-label="About scene length unit" data-info="Measure scene time in seconds, frames, or iterations.">i</button>
      </div>
      <div id="scene-switch-mode-dropdown" class="custom-dropdown">
        <button id="scene-switch-mode-trigger" class="custom-dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="scene-switch-mode-label"></span>
          <svg class="custom-dropdown-arrow" viewBox="0 0 12 7" aria-hidden="true">
            <path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul id="scene-switch-mode-list" class="custom-dropdown-list" role="listbox" aria-label="Scene Length Unit"></ul>
      </div>
      <select id="scene-switch-mode" style="display:none">
        <option value="seconds">Seconds</option>
        <option value="frames">Frames</option>
        <option value="iterations">Iterations</option>
      </select>

      <div class="label-row">
        <label for="scene-switch-limit-slider">Scene Length</label>
        <div class="label-side">
          <span id="scene-switch-limit-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About scene length" data-info="How long a scene stays on screen before switching.">i</button>
        </div>
      </div>
      <input id="scene-switch-limit-slider" type="range">

      <div class="label-row">
        <label for="iteration-rate-slider">Iterations Per Second</label>
        <div class="label-side">
          <span id="iteration-rate-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About iterations per second" data-info="How fast the fractal grows each second.">i</button>
        </div>
      </div>
      <input id="iteration-rate-slider" type="range" min="15" max="720" step="1">
    </section>

    <section class="control-section">
      <h2>Scene</h2>
      <div class="label-row">
        <label for="boundary-search-depth-slider">Search Depth</label>
        <div class="label-side">
          <span id="boundary-search-depth-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About search depth" data-info="Higher values usually find deeper, more dramatic scenes.">i</button>
        </div>
      </div>
      <input id="boundary-search-depth-slider" type="range" min="4" max="36" step="1">

      <div class="label-row">
        <label for="search-zoom-aggression-slider">Search Zoom</label>
        <div class="label-side">
          <span id="search-zoom-aggression-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About search zoom" data-info="Lower values search more cautiously. Higher values dive deeper per search step.">i</button>
        </div>
      </div>
      <input id="search-zoom-aggression-slider" type="range" min="2" max="8" step="0.1">

      <div class="label-row">
        <label>Exponent Range</label>
        <div class="label-side">
          <span id="power-range-value" class="value-label"></span>
          <button class="info-button" type="button" aria-label="About exponent range" data-info="Choose which Mandelbrot exponent values new scenes can use.">i</button>
        </div>
      </div>
      <div class="dual-range" id="power-range-control">
        <div class="dual-range-track"></div>
        <div class="dual-range-fill" id="power-range-fill"></div>
        <div class="dual-range-ticks" aria-hidden="true">
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
          <span class="dual-range-tick"></span>
        </div>
        <div class="dual-range-labels" aria-hidden="true">
          <span class="dual-range-label">2</span>
          <span class="dual-range-label">3</span>
          <span class="dual-range-label">4</span>
          <span class="dual-range-label">5</span>
          <span class="dual-range-label">6</span>
          <span class="dual-range-label">7</span>
          <span class="dual-range-label">8</span>
        </div>
        <input id="power-min-slider" type="range" min="2" max="8" step="1">
        <input id="power-max-slider" type="range" min="2" max="8" step="1">
      </div>
    </section>

    <section class="control-section">
      <h2>Screen</h2>
      <div class="label-row">
        <label for="resolution-preset-select">Resolution Quality</label>
        <button class="info-button" type="button" aria-label="About resolution quality" data-info="Higher looks sharper. Lower is lighter on the GPU.">i</button>
      </div>
      <div id="resolution-preset-dropdown" class="custom-dropdown">
        <button id="resolution-preset-trigger" class="custom-dropdown-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span id="resolution-preset-label"></span>
          <svg class="custom-dropdown-arrow" viewBox="0 0 12 7" aria-hidden="true">
            <path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul id="resolution-preset-list" class="custom-dropdown-list" role="listbox" aria-label="Resolution Quality"></ul>
      </div>
      <select id="resolution-preset-select" style="display:none">
        <option value="1">High</option>
        <option value="2">Medium</option>
        <option value="3">Low</option>
        <option value="4">Very Low</option>
      </select>

      <div class="toggle-row">
        <span id="show-buttons-label">Show Buttons</span>
        <input id="show-buttons-toggle" type="checkbox" checked aria-labelledby="show-buttons-label">
        <button class="info-button" type="button" aria-label="About show buttons" data-info="Show the floating screen controls on top of the scene.">i</button>
      </div>
    </section>

    <section class="control-section actions">
      <h2>Actions</h2>
      <div class="action-row">
        <button id="new-scene-button" type="button">Generate New Scene</button>
        <button class="info-button" type="button" aria-label="About generate new scene" data-info="Switch to a fresh random scene right away.">i</button>
      </div>
      <div class="action-row">
        <button id="reset-settings-button" type="button">Reset Settings</button>
        <button class="info-button" type="button" aria-label="About reset settings" data-info="Arms a reset confirmation first. Click it again within 4 seconds to restore the default look and timing.">i</button>
      </div>
    </section>

    <footer class="menu-footer">
      <span>&copy; 2026 Peleg Michael</span>
      <a href="https://github.com/peleg773/Madelbrot-background" target="_blank" rel="noreferrer noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true">

        </svg>
        GitHub
      </a>
    </footer>
  </aside>

  <div id="unsupported" role="alert" aria-live="polite"></div>
  <script defer src="./app.js"></script>
</body>
</html>
